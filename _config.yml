### Site Settings ###
title               : nh4ttruong
description         : >-
                      Tomorrow, Sunflowers will bloom!
baseurl             : ""
repository          : nh4ttruong
open_new_tab        : false
google_analytics: G-6P2QMTRKX6

### Navbar Settings ###
nav_exclude:
  - pages/tags.html
  - pages/404.html
  - pages/index.md

### Author Info ###
author:
  name              : Nhật Trường
  image             : https://i.imgur.com/V60Nk1V.jpg
  github            : nh4ttruong
  email             : truongtbn243@gmail.com
  facebook          : nh4ttruong
  instagram         : nh4ttruong
  youtube           : nh4ttruong

### Permalink ###
permalink: /blog/:title

### Collections ###
collections:
  projects:
    output: true
    permalink: /projects/:name
  blogs:
    output: true
    permalink: /blog/:title
  shorteners:
    output: true
    permalink: /:slug/

### Analytics ###
analytics:
  enabled: true                                        # Set true to enable analytics
  google:
    tracking_id: G-6P2QMTRKX6
    
### Defaults for collections ###
defaults:
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      comments: true                                   # Set to true to enable disqus comments

### Plugin ###
plugins:
  - jekyll-default-layout
  - jekyll-gist
  - jekyll-github-metadata
  - jekyll-include-cache
  - jemoji
  - jekyll-redirect-from
  
### Exclude from processing ###
exclude:
  - LICENSE
  - "*.log"
  - README.md
